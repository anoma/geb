name: Lean Action CI

on:
  push:
    branches: [main, integration]
    paths: ['geb-lean/**']
  pull_request:
    paths: ['geb-lean/**']
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

defaults:
  run:
    working-directory: geb-lean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: geb-lean
          script: |
            lake build
            lake test
      - uses: leanprover-community/docgen-action@v1

  axiom_check:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run axiom check
        run: |
          bash scripts/check-axioms.sh \
            GebLean/ GebLeanTests/ \
            | tee axiom-check-report.txt
      - name: Upload axiom-check report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: axiom-check-report
          path: geb-lean/axiom-check-report.txt
          if-no-files-found: error
