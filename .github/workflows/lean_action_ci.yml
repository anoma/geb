name: Lean Action CI

on:
  push:
    branches: [main, integration]
    paths:
      - 'geb-lean/**'
      - '.github/workflows/lean_action_ci.yml'
  pull_request:
    paths:
      - 'geb-lean/**'
      - '.github/workflows/lean_action_ci.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: geb-lean
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: geb-lean
      - name: Run axiom check
        run: |
          bash scripts/check-axioms.sh \
            GebLean/ GebLeanTests/ \
            | tee axiom-check-report.txt
      - name: Upload axiom-check report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: axiom-check-report
          path: geb-lean/axiom-check-report.txt
          if-no-files-found: error
