name = "geb-lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["GebLean"]
testDriver = "GebLeanTests"
lintDriver = "batteries/runLinter"
# Promotes warning-class diagnostics (including `declaration uses 'sorry'`)
# to build errors at the Lean kernel level.
moreLeanArgs = ["-DwarningAsError=true"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
pp.proofs = false
pp.showLetValues = false
pp.universes = false
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0-rc6"

[[require]]
name = "cslib"
scope = "leanprover"
rev = "v4.29.0-rc6"

[[lean_lib]]
name = "GebLean"

# Test library
[[lean_lib]]
name = "GebLeanTests"
roots = ["GebLeanTests"]

[lean_lib.leanOptions]
linter.hashCommand = false

# Vendored geb-mathlib source. `globs = ["Geb.*"]` covers the whole
# vendored namespace, naming no geb-mathlib subdirectory, so the wiring
# tracks geb-mathlib's growth. The package's hard warningAsError and
# leanOptions are inherited (no per-lib override).
[[lean_lib]]
name = "Geb"
srcDir = "vendor/geb-mathlib"
globs = ["Geb.*"]
